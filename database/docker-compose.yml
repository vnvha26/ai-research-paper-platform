services:
  postgres_db:
    image: postgres:15
    container_name: s2orc_postgres
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: paper_recommender
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j_db:
    image: neo4j:5.12.0
    container_name: s2orc_neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jvha2601
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 4G
      
      NEO4J_server_memory_pagecache_size: 2G
      
      NEO4J_dbms_memory_transaction_total_max: 0
      
    ports:
      - "7474:7474" 
      - "7687:7687" 
    volumes:
      - ./neo4j_data:/data
    restart: unless-stopped

  qdrant_db:
    image: qdrant/qdrant:v1.17.1
    container_name: s2orc_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped
